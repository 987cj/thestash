---
layout: layout.html
---

<header class="custom-section-bg">
	<h1> {{ title }} </h1>
	<h3> {{ page.date | formatDateOutput }} </h3>
	<div class="flex flex-wrap">
	{% for tag in pagetags %}
		<h5 class="bg-green-500 my-1 mr-2 px-1">{{ tag }}</h5>
	{% endfor %}
	</div>
</header>

<div class="custom-section-bg">
{{ content }}
</div>

{% if related_links %}
<div class="custom-section-bg">
	<h1>Related Links:</h1>
	{% for link in related_links %}
	<h2><a href="{{ link[1] }}" class="text-amber-600">{{ link[0] }}</a></h2>
	{% endfor %}
</div>
{% endif %}
